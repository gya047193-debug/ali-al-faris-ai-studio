<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Ali Al-Faris AI Studio Pro</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #161616; padding: 30px; border-radius: 20px; border: 1px solid #00ff96; box-shadow: 0 0 20px rgba(0,255,150,0.2); }
        textarea { width: 100%; height: 250px; background: #000; color: #00ff96; border: 1px solid #333; border-radius: 12px; padding: 15px; font-size: 18px; margin-bottom: 20px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; text-align: right; }
        .card { background: #222; padding: 15px; border-radius: 10px; }
        label { display: block; margin-bottom: 10px; color: #00ff96; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: #00ff96; }
        button { width: 100%; background: #00ff96; color: #000; border: none; padding: 20px; font-size: 20px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        #audioPlayer { width: 100%; margin-top: 25px; display: none; }
        .download-link { display: none; margin-top: 20px; color: #00ff96; text-decoration: none; border: 1px solid #00ff96; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ali Al-Faris AI Studio</h1>
        <p>نظام المعالجة البشرية 2026 | أسرار علم النفس المظلم</p>
        <textarea id="textInput" placeholder="ضع سكريبت الفيديو هنا (حتى 10,000 حرف)..."></textarea>
        <div class="controls">
            <div class="card"><label>الصوت:</label><select id="voice" style="width:100%"><option value="ar-EG-ShakirNeural">شاكر (مصري)</option></select></div>
            <div class="card"><label>الحيوية:</label><input type="range" id="pitch" min="-50" max="50" value="0"></div>
            <div class="card"><label>السرعة:</label><input type="range" id="rate" min="-50" max="50" value="0"></div>
            <div class="card"><span>نفس بشري و HD فعال ✅</span></div>
        </div>
        <button onclick="generate()">تحويل الصوت الآن</button>
        <audio id="audioPlayer" controls></audio>
        <br><a id="downloadBtn" href="/download" class="download-link">تحميل HD</a>
    </div>
    <script>
        async function generate() {
            const btn = document.querySelector('button');
            btn.innerText = "جاري المعالجة...";
            const res = await fetch('/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    text: document.getElementById('textInput').value,
                    voice: document.getElementById('voice').value,
                    pitch: document.getElementById('pitch').value + 'Hz',
                    rate: document.getElementById('rate').value + '%'
                })
            });
            const data = await res.json();
            if(data.status === 'success') {
                const player = document.getElementById('audioPlayer');
                player.src = data.audio_url + '?t=' + new Date().getTime();
                player.style.display = 'block';
                document.getElementById('downloadBtn').style.display = 'inline-block';
                btn.innerText = "تحويل الصوت الآن";
            }
        }
    </script>
</body>
</html>
